services:
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_CONTEXT_LENGTH: 128
      OLLAMA_KEEP_ALIVE: -1
      OLLAMA_MODEL: hf.co/LiquidAI/LFM2.5-350M-GGUF:Q8_0
    volumes:
      - ./ollama-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "ollama ps | grep -q \"LFM2.5-350M-GGUF\""]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  lmstudio:
    image: library/ubuntu:24.04
    environment:
      LMSTUDIO_MODEL: liquid/lfm2.5-350m
      LMSTUDIO_MODEL_ID: lfm2.5-350m
      LMSTUDIO_CONTEXT: 128
    volumes:
      - ./lmstudio-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["bash", "/entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:1234/api/v0/models | python3 -c \"import json,sys; data=json.load(sys.stdin); assert any(m.get('id')=='lfm2.5-350m' and m.get('state')=='loaded' for m in data.get('data',[]))\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 120s

  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    environment:
      LLAMACPP_MODEL_REPO: LiquidAI/LFM2.5-350M-GGUF:Q8_0
      LLAMACPP_CONTEXT: 256
    volumes:
      - ./llamacpp-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/v1/models | grep -q 'LFM2.5-350M'"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s

  opencode:
    image: ghcr.io/anomalyco/opencode
    depends_on:
      llamacpp:
        condition: service_healthy
    network_mode: "service:llamacpp"
    volumes:
      - ../..:/workspace
    working_dir: /tmp/opencode-test
    entrypoint:
      - sh
      - -lc
      - mkdir -p /tmp/opencode-test && while :; do sleep 3600; done

  vllm:
    image: vllm/vllm-openai-cpu:latest-x86_64
    command:
      - --host=0.0.0.0
      - --port=8000
      - --dtype=auto
      - --max-model-len=128
      - --no-enable-prefix-caching
      - --trust-remote-code
      - Qwen/Qwen2.5-0.5B-Instruct
    environment:
      VLLM_CPU_KVCACHE_SPACE: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/v1/models')); assert any(item.get('id') == 'Qwen/Qwen2.5-0.5B-Instruct' for item in data.get('data', []))\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 60s

  exo:
    build:
      context: .
      dockerfile: exo.Dockerfile
    environment:
      EXO_MODEL: LiquidAI/LFM2.5-350M-MLX-4bit
      EXO_PORT: 52415
    volumes:
      - ./exo-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["bash", "/entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "EXO_MODEL=$${EXO_MODEL} python -c \"import json, os, urllib.request; state=json.load(urllib.request.urlopen('http://127.0.0.1:52415/state')); model=os.environ['EXO_MODEL']; runner_id=None; instances=state.get('instances', {}); runners=state.get('runners', {}); [runner_id := next(iter(instance.get('MlxRingInstance', {}).get('shardAssignments', {}).get('nodeToRunner', {}).values()), None) for instance in instances.values() if instance.get('MlxRingInstance', {}).get('shardAssignments', {}).get('modelId') == model]; assert runner_id is not None; assert 'RunnerReady' in runners.get(runner_id, {})\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 120s
